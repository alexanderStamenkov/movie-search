<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Филмова Търсачка</title>

    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-noise"></div>

    <div class="container">
      <header class="header">
        <div class="header-top">
          <div class="logo">
            <span class="logo-dot"></span>
            CINEMIX
          </div>
          <p class="tagline">Find your next obsession</p>
        </div>

        <div class="search-wrapper">
          <div class="search-box">
            <svg
              class="search-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Inception, The Godfather, Matrix..."
            />
            <button id="searchBtn">
              <span>Search</span>
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <div class="message" id="message"></div>
      <section class="results" id="results"></section>
    </div>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>
